name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/irskep/autowt/internal/cli.version=${GITHUB_REF_NAME}"

          for pair in darwin/arm64 linux/amd64 linux/arm64; do
            os="${pair%/*}"
            arch="${pair#*/}"
            GOOS=$os GOARCH=$arch go build -ldflags="$LDFLAGS" -o "dist/autowt-${os}-${arch}" .
            GOOS=$os GOARCH=$arch go build -ldflags="$LDFLAGS" -o "dist/awt-${os}-${arch}" ./cmd/awt
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
