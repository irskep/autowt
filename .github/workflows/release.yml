name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: autowt

      - uses: actions/checkout@v4
        with:
          repository: irskep/automate-terminal
          ref: rewrite-it-in-go
          path: automate-terminal

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binaries
        working-directory: autowt
        run: |
          mkdir -p dist

          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X github.com/irskep/autowt/internal/cli.version=${GITHUB_REF_NAME}" -o dist/autowt-darwin-arm64 .
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X github.com/irskep/autowt/internal/cli.version=${GITHUB_REF_NAME}" -o dist/autowt-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X github.com/irskep/autowt/internal/cli.version=${GITHUB_REF_NAME}" -o dist/autowt-linux-arm64 .

      - name: Create release
        working-directory: autowt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/autowt-darwin-arm64 \
            dist/autowt-linux-amd64 \
            dist/autowt-linux-arm64
